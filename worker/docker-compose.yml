# Dokploy-friendly compose file for the jsperf.app benchmark worker.
#
# Point Dokploy at this file (Compose application). Dokploy handles the
# reverse proxy + SSL via Traefik labels we don't need to set here — its
# auto-router picks up the exposed port.
#
# IMPORTANT: build the runtime images on the host BEFORE the first deploy:
#   cd /opt/jsperf.app/worker && ./scripts/build-images.sh
# The orchestrator container only orchestrates `docker run` against those
# pre-built images; it does not build them itself.

services:
  jsperf-worker:
    container_name: jsperf-worker
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: "8080"
      BENCHMARK_WORKER_SECRET: ${BENCHMARK_WORKER_SECRET:?set BENCHMARK_WORKER_SECRET in Dokploy env}
      COLLECT_PERF: ${COLLECT_PERF:-1}
    volumes:
      # Long-form syntax is required when Dokploy deploys via Docker Swarm
      # (`docker stack deploy`) — the inline `host:container` shorthand is
      # silently stripped by some Swarm orchestrators.
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    expose:
      - "8080"
    cap_add:
      # Allow `perf stat` inside the worker-spawned containers. PERFMON is
      # the modern (kernel >= 5.8) replacement for SYS_ADMIN's perf bits;
      # SYS_PTRACE is needed for perf to attach to the runtime process.
      #
      # NOTE: Docker Swarm strips cap_add when deploying via `stack deploy`
      # in many Dokploy versions. If `/health` reports `perf: false` after
      # deploying, add these capabilities via Dokploy's UI (Service →
      # Advanced → Capabilities) — the compose entry is a hint, not a
      # guarantee, in Swarm mode.
      - SYS_PTRACE
      - PERFMON
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
