# Dokploy-friendly compose file for the jsperf.app benchmark worker.
#
# Use Dokploy's "Compose" application type and point Compose Path at
# `worker/docker-compose.yml`. Dokploy fronts the service via Traefik
# automatically once a domain is attached.
#
# IMPORTANT: build the runtime images on the host BEFORE the first deploy:
#   cd /opt/jsperf.app/worker && ./scripts/build-images.sh
# The orchestrator only orchestrates `docker run` against those pre-built
# images; it never builds them itself.

services:
  jsperf-worker:
    container_name: jsperf-worker
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: "8080"
      BENCHMARK_WORKER_SECRET: ${BENCHMARK_WORKER_SECRET:?set BENCHMARK_WORKER_SECRET in Dokploy env}
      COLLECT_PERF: ${COLLECT_PERF:-1}
      # MUST equal the host-side bind mount target below. The orchestrator
      # writes generated benchmark scripts here, then asks the host Docker
      # daemon to bind sub-paths into runtime containers. The host can
      # only see paths that exist on the host, so this directory has to
      # be mapped 1:1.
      WORK_DIR_BASE: /tmp/jsperf-worker
    volumes:
      # 1. Required: gives the orchestrator the host Docker daemon. Long
      #    form because Dokploy / Swarm sometimes strips the shorthand.
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      # 2. Required: shared scratch directory between the orchestrator and
      #    the host. Per-run tmpdirs created here are visible to both
      #    sides, so the runtime containers can read /work/bench.js.
      - type: bind
        source: /tmp/jsperf-worker
        target: /tmp/jsperf-worker
    expose:
      - "8080"
    # NOTE: the orchestrator container itself does not need any
    # capabilities. SYS_PTRACE and PERFMON are passed as `--cap-add` flags
    # to the *child* runtime containers it spawns (see worker/docker.js).
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
